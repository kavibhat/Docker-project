version: '3.8'

services:
  quote-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quote-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - hotel-net

  # Optional: nginx reverse proxy in front
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      quote-api:
        condition: service_healthy
    networks:
      - hotel-net

networks:
  hotel-net:
    driver: bridge
